<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadre conceptuel DS-DC, DRSP Montréal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  /* Palette DSDC : accent teal, texte/lignes noirs, fond crème */
  --red: #46747F;
  --red-soft: rgba(70, 116, 127, 0.10);
  --red-hover: rgba(70, 116, 127, 0.18);
  --pink-light: #e7eeef;
  --pink-medium: #bcd0d4;
  --pink-dark: #7ea3aa;
  --gray: #000000;
  --text: #000000;
  --muted: #000000;
  --bg: #F2EEE4;
  --border: #000000;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 15px;
  color: var(--text);
  background: var(--bg);
  height: 100%;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}
.app { display: grid; grid-template-columns: minmax(0, 1.55fr) minmax(0, 1fr); height: 100vh; width: 100vw; }
.left { position: relative; background: var(--bg); border-right: 1px solid var(--border); overflow-y: auto; padding: 24px 32px; }
.left-header { margin-bottom: 18px; display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
.home-btn { background: none; border: 1px solid var(--border); color: var(--gray); padding: 5px 10px; border-radius: 7px; font-family: inherit; font-size: 12px; cursor: pointer; transition: all 0.15s; }
.home-btn:hover { background: var(--pink-light); color: var(--red); border-color: var(--pink-medium); }
/* Onglets — même langage visuel que la page Cartes (.map-pick) */
.tabs { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.tab { appearance: none; background: transparent; border: 1.5px solid transparent; border-radius: 7px; font: inherit; font-size: 12.5px; font-weight: 700; letter-spacing: .02em; text-transform: uppercase; color: var(--muted); padding: 4px 10px; cursor: pointer; transition: color 120ms ease, border-color 120ms ease; }
.tab:hover { color: #000000; }
.tab[aria-current="page"] { border-color: #000000; color: #000000; }
.tab:focus-visible { outline: 2px solid #000000; outline-offset: 1px; }
/* Cadre simplifié interactif */
.lview[hidden] { display: none; }
.snode { cursor: pointer; }
.snode .box { transition: filter 0.15s ease, stroke 0.15s ease; }
.snode:hover .box { filter: brightness(0.94); }
.snode.active .box { stroke: #000000; stroke-width: 1.75px; }
.ex-item { background: #fff; border-left: 3px solid var(--pink-medium); padding: 9px 13px; margin-bottom: 10px; font-size: 13.5px; line-height: 1.55; border-radius: 0 6px 6px 0; }
.ex-item strong { color: var(--red); font-weight: 600; }
.theory-link { margin: 14px 0; }
.theory-link button { background: var(--pink-light); border: none; color: var(--red); padding: 8px 14px; border-radius: 8px; font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer; }
.theory-link button:hover { background: var(--pink-medium); }
.chrono { font-size: 13px; line-height: 1.6; margin: 10px 0 16px; }
.chrono div { padding: 4px 0; border-bottom: 1px solid #000000; }
.chrono b { color: var(--red); font-weight: 600; }
.svg-wrap { position: relative; width: 100%; max-width: none; margin: 0; }
.svg-wrap img { width: 100%; display: block; user-select: none; pointer-events: none; }
.zone { position: absolute; cursor: pointer; border-radius: 6px; transition: background 0.18s ease, box-shadow 0.18s ease; border: 1.5px solid transparent; }
.zone:hover { background: var(--red-soft); border-color: rgba(177, 38, 56, 0.40); }
.zone.active { background: var(--red-hover); border-color: var(--red); box-shadow: 0 0 0 2px rgba(177, 38, 56, 0.10); }
.right { background: #F2EEE4; overflow-y: auto; padding: 40px 48px 80px 48px; }
/* Barre de recherche — même gabarit que celle de Concertations (.conc-search input) */
.search-bar { position: relative; flex: 0 0 auto; width: 230px; max-width: 46vw; margin-left: auto; }
.search-bar input { width: 100%; box-sizing: border-box; padding: 7px 12px; font-family: inherit; font-size: 10.5pt; color: #000000; border: 1.5px solid #000000; border-radius: 8px; background: #fff; outline: none; transition: border-color 0.15s; }
.search-bar input:focus { border-color: var(--red); }
.search-results { position: absolute; top: 40px; left: auto; right: 0; width: 340px; max-width: 80vw; background: #fff; border: 1px solid var(--border); border-radius: 8px; max-height: 340px; overflow-y: auto; display: none; box-shadow: 0 8px 20px rgba(0,0,0,0.06); z-index: 20; }
.search-results.open { display: block; }
.search-results .item { padding: 10px 16px; font-size: 14px; cursor: pointer; border-bottom: 1px solid #000000; }
.search-results .item:hover { background: var(--pink-light); }
.search-results .item:last-child { border-bottom: none; }
.welcome { color: var(--muted); padding-top: 4px; }
.welcome h1 { font-size: 28px; font-weight: 600; color: var(--text); margin-bottom: 12px; line-height: 1.25; }
.welcome p { font-size: 14.5px; max-width: 460px; margin-bottom: 10px; }
.welcome .hint { display: inline-block; margin-top: 14px; padding: 10px 16px; border-radius: 8px; background: var(--pink-light); color: var(--red); font-size: 13px; font-weight: 500; }
.section-banner { margin-bottom: 22px; padding-bottom: 14px; border-bottom: 2px solid var(--red); }
.section-banner .kicker { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); font-weight: 500; margin-bottom: 4px; }
.section-banner h1 { font-size: 24px; font-weight: 600; color: var(--red); line-height: 1.2; }
.concept-card { margin-bottom: 28px; padding-bottom: 22px; }
.concept-card .definition { font-size: 14.5px; color: var(--text); line-height: 1.6; margin-bottom: 16px; white-space: pre-line; }
.section-label { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); font-weight: 600; margin-bottom: 6px; margin-top: 16px; }
.connexes { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
.connexes .chip { background: var(--pink-light); color: var(--red); padding: 4px 10px; border-radius: 100px; font-size: 12px; font-weight: 500; }
.example { background: #fff; border-left: 3px solid var(--red); padding: 10px 14px; margin-bottom: 14px; font-size: 13.5px; color: var(--text); line-height: 1.55; border-radius: 0 6px 6px 0; white-space: pre-line; }
.example .label { font-size: 9.5px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--red); font-weight: 600; margin-bottom: 3px; }
.example.inspirant { border-left-color: var(--pink-dark); }
.example.inspirant .label { color: var(--pink-dark); }
.extra-block { background: var(--pink-light); border-radius: 6px; padding: 12px 14px; margin-bottom: 14px; font-size: 13px; line-height: 1.55; white-space: pre-line; }
.extra-block .label { font-size: 9.5px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--red); font-weight: 600; margin-bottom: 4px; }
.source { font-size: 11px; color: var(--muted); font-style: italic; line-height: 1.5; margin-top: 14px; word-break: break-word; }
.concept-image { margin: 14px 0; border-radius: 6px; overflow: hidden; background: var(--pink-light); }
.concept-image img { width: 100%; height: auto; display: block; }
.concept-image .caption { font-size: 11px; color: var(--muted); padding: 6px 10px; background: #fff; border-top: 1px solid var(--border); }
.empty-note { color: var(--muted); font-size: 13.5px; font-style: italic; padding: 12px 0; }
.related-links { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.related-links button { background: var(--pink-light); border: none; color: var(--red); padding: 8px 14px; border-radius: 8px; font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer; }
.related-links button:hover { background: var(--pink-medium); }
a { color: var(--red); }
@media (max-width: 1000px) {
  .app { grid-template-columns: 1fr; height: auto; }
  .left { border-right: none; border-bottom: 1px solid var(--border); }
  .right { padding: 32px 24px 60px 24px; }
}
</style>
</head>
<body>
<div class="app">
  <div class="left">
    <div class="left-header">
      <div class="tabs" role="tablist" aria-label="Choisir une vue">
        <button class="tab" data-tab="cadre" aria-current="page">Cadre</button>
        <button class="tab" data-tab="verdun" aria-current="false">Verdun</button>
        <button class="tab" data-tab="cdn" aria-current="false">CDN</button>
      </div>
      <button class="home-btn" id="homeBtn">Vue d'ensemble</button>
      <div class="search-bar">
        <input type="text" id="search" placeholder="Rechercher…" autocomplete="off">
        <div class="search-results" id="searchResults"></div>
      </div>
    </div>
    <div class="lview" id="lv-cadre">
      <div class="svg-wrap" id="svgwrap">
        <img src="cadre.svg" alt="Cadre conceptuel DS-DC">
      </div>
    </div>
    <div class="lview" id="lv-verdun" hidden></div>
    <div class="lview" id="lv-cdn" hidden></div>
  </div>
  <div class="right" id="right">
    <div id="content"></div>
  </div>
</div>
<script>
const DATA = {"developpement-social": {"title": "Développement social (DS)", "definition": "« Le développement social vise à améliorer les conditions de vie, favoriser l'inclusion sociale, réduire les inégalités et renforcer les potentiels individuels et collectifs grâce à la participation active et intersectorielle d'actrices et d'acteurs communautaires, institutionnels, étatiques ainsi qu'à l'engagement citoyen. »", "connexes": ["Conditions de vie décentes", "Citoyenneté démocratique", "Déterminants sociaux de la santé"], "exMtl": "La Politique de développement social « Montréal de tous les possibles » (2017) de la Ville de Montréal.", "exInsp": "Pour l'INSPQ (2002), le DS vise la mise en place, dans les communautés, les régions et à l'échelle d'une société, des conditions requises pour permettre aux communautés d'avoir droit à des conditions de vie décentes, de développer pleinement leurs potentiels, de participer activement à la vie sociale et d'être traitées avec dignité.", "extra": "", "images": [], "source": "St-Louis, M.-P. et St-Germain, L. (2022). ABC du développement social : Guide d'apprentissage et d'accompagnement du RQDS. Réseau québécois de développement social et Centre de recherche sociale appliquée. https://praxis.encommun.io/n/Cn8Qli81z0qogQmaszP5Y9YUcSQ/ ; Institut national de santé publique du Québec. (2002). La santé des communautés : perspectives pour la contribution de la santé publique au développement social et au développement des communautés. Gouvernement du Québec. https://www.inspq.qc.ca/pdf/publications/082_SanteCommunautes.pdf"}, "developpement-communautes": {"title": "Développement des communautés (DC)", "definition": "« Le développement des communautés est un processus de coopération volontaire, d'entraide et de construction de liens sociaux entre les résidents et les institutions d'un milieu local. Ce processus vise l'amélioration des conditions de vie sur les plans social, culturel, économique et environnemental. »", "connexes": ["Développement social local", "Empowerment", "Milieu local"], "exMtl": "L'Initiative montréalaise de soutien au développement social local (IMSDSL) soutient 32 Tables de quartier depuis 2006.", "exInsp": "", "extra": "À la DRSP, les personnes vivant à Montréal incluent toutes les personnes qui résident, travaillent ou étudient à Montréal, peu importe leur statut migratoire : les personnes demandeuses d'asile, réfugiées et migrantes à statut précaire font partie des communautés montréalaises (DRSP, 2023).", "images": [], "source": "Institut national de santé publique du Québec. (2002). La santé des communautés : perspectives pour la contribution de la santé publique au développement social et au développement des communautés. Gouvernement du Québec. https://www.inspq.qc.ca/pdf/publications/082_SanteCommunautes.pdf"}, "enjeux-transversaux": {"title": "Enjeux transversaux", "definition": "Les enjeux transversaux — rapports de pouvoir, transformation numérique, changements climatiques — traversent l'ensemble des dimensions du DS et du DC. Ils exigent une approche intégrée plutôt que sectorielle afin d'éviter d'aggraver les inégalités sociales de santé. À titre d'exemple, le PNSP considère la santé mentale comme « une préoccupation transversale à l'ensemble des actions ».", "connexes": ["Intersectorialité", "Santé dans toutes les politiques", "Approche intégrée"], "exMtl": "", "exInsp": "", "extra": "", "images": [], "source": "Ministère de la Santé et des Services sociaux. (2015). Programme national de santé publique 2015-2025. Gouvernement du Québec."}, "rapports-pouvoir": {"title": "Rapports de pouvoir", "definition": "« Le pouvoir est une composante des règles, et les règles sont puissantes. Il est important de souligner que les règles constituent la manifestation des rapports de force » : elles « consignent et encodent » les systèmes oppresseurs (p. ex. capitalisme, racisme, capacitisme, cis-hétéronormativité, sexisme, colonialisme) et entraînent des schémas d'avantages qui apparaissent dans les conditions de la vie quotidienne.", "connexes": ["Oppression systémique", "Racisme structurel", "Intersectionnalité"], "exMtl": "", "exInsp": "Le PNSP 2025-2035 oriente les interventions vers les populations privées d'équité afin de réduire les écarts produits par les rapports de pouvoir structurels.", "extra": "", "images": [], "source": "Centre de collaboration nationale des déterminants de la santé. (2024). Déterminants de la santé : Parlons-en. CCNDS, Université St. Francis Xavier. https://nccdh.ca/wp-content/uploads/2024/10/CCNDS_Lets_talk_Determinants_of_health_FR.pdf"}, "transformation-numerique": {"title": "Transformation numérique", "definition": "Les technologies numériques et les mégadonnées peuvent améliorer les services de santé et les services sociaux, mais leur effet sur l'équité en santé dépend de la manière dont elles sont déployées. Réaliser ce potentiel exige un accès équitable aux services, peu importe l'accès au numérique et la littératie numérique; une conception inclusive des services, dont les priorités sont définies par les personnes utilisatrices; l'encadrement des modèles d'affaires inéquitables des plateformes; et des cadres de droits de la personne protégeant la dignité, l'autonomie et la vie privée. L'intelligence artificielle générative doit être conçue et gouvernée de façon délibérée pour réduire — et non élargir — la fracture numérique. (traduction libre)", "connexes": ["Fracture numérique", "Intelligence artificielle", "Littératie numérique"], "exMtl": "", "exInsp": "Le PNSP 2025-2035 prévoit des activités de surveillance et de soutien face à la fracture numérique et à la désinformation en santé.", "extra": "", "images": [], "source": "Organisation mondiale de la Santé. (2025). World report on social determinants of health equity: Executive summary. OMS. https://doi.org/10.2471/B09387 (traduction libre)"}, "changements-climatiques": {"title": "Changements climatiques", "definition": "Les actions climatiques qui s'attaquent aux déterminants sociaux de l'équité en santé doivent être intersectorielles : réduire la pollution par une réglementation environnementale plus stricte, développer le transport collectif et promouvoir des pratiques agricoles durables qui renforcent la sécurité alimentaire et la nutrition. Les cadres reconnaissant les fardeaux inégaux du réchauffement climatique — dont le Fonds pour les pertes et préjudices lancé à la COP29 — sont des mesures importantes pour réparer les iniquités de santé liées au climat. (traduction libre)", "connexes": ["Triple crise planétaire", "Résilience climatique", "Adaptation"], "exMtl": "", "exInsp": "L'activité 38 du PNSP 2025-2035 soutient la création de milieux de vie complets et résilients au climat.", "extra": "", "images": [], "source": "Organisation mondiale de la Santé. (2025). World report on social determinants of health equity: Executive summary. OMS. https://doi.org/10.2471/B09387 (traduction libre)"}, "actions-determinants": {"title": "DS : actions sur les déterminants structurels de la santé (agir en amont)", "definition": "Agir en amont signifie intervenir sur les causes profondes des inégalités sociales de santé — les déterminants structurels — plutôt que sur leurs manifestations individuelles. Le contexte, les mécanismes structurels et la position socioéconomique des individus constituent ensemble les déterminants structurels des inégalités sociales de santé (traduction libre).", "connexes": ["Agir en amont", "Causes profondes des ISS", "Inégalités sociales de santé"], "exMtl": "Le cadre de référence de la DRSP (2023) cible explicitement les déterminants structurels — revenu, racisme systémique, aménagement — à Montréal.", "exInsp": "", "extra": "", "images": [], "source": "Solar, O. et Irwin, A. (2010). A conceptual framework for action on the social determinants of health. Organisation mondiale de la Santé. https://www.who.int/publications/i/item/9789241500852"}, "determinants-structurels": {"title": "Déterminants structurels", "definition": "Les déterminants structurels de la santé sont « les règles écrites et non écrites qui créent, maintiennent ou éliminent des schémas durables et hiérarchiques d'avantages entre des groupes construits à l'échelle sociale » et la manifestation des déséquilibres du pouvoir. Ces règles prennent la forme de valeurs, de croyances, de visions du monde, de culture et de normes; de gouvernance; de lois, de politiques, de règlements et de budgets; et de pratiques institutionnelles. (traduction libre)", "connexes": ["Déterminants sociaux des ISS", "Causes profondes des ISS", "Macrodéterminants"], "exMtl": "Le cadre de référence de la DRSP (2023) cible explicitement les déterminants structurels (revenu, racisme systémique, aménagement) à Montréal.", "exInsp": "", "extra": "", "images": [{"file": "images/determinants-structurels.png", "caption": "Déterminants structurels de la santé"}], "source": "Heller, J. C., Givens, M. L., Johnson, S. P. et Kindig, D. A. (2024). Keeping it political and powerful: Defining the structural determinants of health. The Milbank Quarterly, 102(2), 351-366. https://doi.org/10.1111/1468-0009.12695 ; Centre de collaboration nationale des déterminants de la santé. (2024). Déterminants de la santé : Parlons-en. https://nccdh.ca/wp-content/uploads/2024/10/CCNDS_Lets_talk_Determinants_of_health_FR.pdf"}, "valeurs-croyances": {"title": "Valeurs, croyances, vision du monde, culture, normes", "definition": "Les valeurs sont des « normes culturellement définies, partagées par des individus ou des groupes, concernant ce qui est souhaitable, convenable, beau, bon ou mauvais. Les valeurs servent de balises générales à la vie en société. » Les croyances sont des « idées partagées par un collectif de personnes au sein d'un système socioculturel. »\n\nLa vision du monde est une conception consciente ou inconsciente de la société, fondée sur nos valeurs, nos croyances et les présupposés qui façonnent la manière dont nous donnons sens au monde.\n\n« La culture renvoie aux croyances, valeurs, pratiques, comportements et artéfacts partagés qui caractérisent un groupe ou une société. Les normes, quant à elles, sont les règles non écrites ou les attentes qui guident et régulent les comportements au sein d'un groupe culturel ou social donné. » (traduction libre)", "connexes": ["Culture", "Idéologies", "Normes sociales"], "exMtl": "", "exInsp": "", "extra": "", "images": [], "source": "Elwell (2013), Healey et Hinson (2013) et Matsumoto (2017), cités dans Heller, J. C., Givens, M. L., Johnson, S. P. et Kindig, D. A. (2024). Keeping it political and powerful: Defining the structural determinants of health. The Milbank Quarterly, 102(2), 351-366. https://doi.org/10.1111/1468-0009.12695 (traduction libre)"}, "gouvernance": {"title": "Gouvernance", "definition": "« Système de valeurs, de politiques et d'institutions par lequel une société gère ses affaires économiques, politiques et sociales au moyen d'interactions entre l'État, la société civile et le secteur privé. C'est la façon dont une société s'organise pour prendre et mettre en œuvre des décisions. » La gouvernance peut prendre de nombreuses formes, des modèles démocratiques aux modèles autoritaires, et s'appliquer à plusieurs contextes : entreprise, international, national, local. (traduction libre)", "connexes": ["Économie politique", "Déterminants macroéconomiques", "Constellations de pouvoir"], "exMtl": "", "exInsp": "", "extra": "", "images": [], "source": "Programme des Nations Unies pour le développement. (1997). Governance for sustainable human development: A UNDP policy document. PNUD. Cité dans Heller et al. (2024). The Milbank Quarterly, 102(2), 351-366. https://doi.org/10.1111/1468-0009.12695 (traduction libre)"}, "lois-politiques": {"title": "Lois, politiques, règlements, budgets", "definition": "Instruments utilisés par les gouvernements et les organisations publiques et privées pour atteindre leurs objectifs et façonner le contexte et les comportements. Une loi est une « coutume ou pratique contraignante d'une communauté [...] appliquée par une autorité de contrôle ». Une politique est « une ligne de conduite ou une méthode d'action définie [...] pour guider et déterminer les décisions présentes et futures ». Un règlement est « une règle ou un ordre émis par une autorité exécutive ou un organisme de réglementation [...] ayant force de loi ». Un budget est « un plan de coordination des ressources et des dépenses ». (traduction libre)", "connexes": ["Politiques publiques favorables à la santé", "Santé dans toutes les politiques (HiAP)", "Politiques fiscales"], "exMtl": "", "exInsp": "« Une politique de promotion de la santé combine des méthodes différentes mais complémentaires, et notamment la législation, les mesures fiscales, la taxation et les changements organisationnels. » (OMS, 1986, Charte d'Ottawa)", "extra": "", "images": [], "source": "Merriam-Webster (2024), cité dans Heller, J. C., Givens, M. L., Johnson, S. P. et Kindig, D. A. (2024). Keeping it political and powerful: Defining the structural determinants of health. The Milbank Quarterly, 102(2), 351-366. https://doi.org/10.1111/1468-0009.12695 (traduction libre)"}, "pratiques-institutionnelles": {"title": "Méthodes institutionnelles (pratiques institutionnelles)", "definition": "« Les façons dont les membres d'une institution exercent leurs fonctions et leurs responsabilités, souvent à travers des modèles, procédures et règles établis de comportement. Elles peuvent comprendre les processus décisionnels, les protocoles de communication, les évaluations du rendement, les pratiques d'embauche et de promotion, ainsi que l'allocation des ressources. » (traduction libre)", "connexes": ["Coconstruction", "ADS+", "Mobilisation des connaissances"], "exMtl": "La Table des groupes de femmes de Montréal déploie le site et la formation ADS+ pour outiller les municipalités et les organismes.", "exInsp": "", "extra": "", "images": [], "source": "National Research Council. (2015). Enhancing the effectiveness of team science. National Academies Press. https://doi.org/10.17226/19007. Cité dans Heller et al. (2024). The Milbank Quarterly, 102(2), 351-366. https://doi.org/10.1111/1468-0009.12695 (traduction libre)"}, "role-sante-publique": {"title": "Rôle de la santé publique", "definition": "Le CCNDS (2013) définit quatre rôles de la santé publique pour améliorer l'équité en santé : 1) évaluer et faire rapport sur la présence et l'incidence des iniquités en santé et sur les stratégies efficaces pour les atténuer; 2) modifier et orienter les interventions et les services afin d'atténuer les iniquités; 3) établir des partenariats avec d'autres secteurs; et 4) participer à l'élaboration des politiques.", "connexes": ["Équité en santé", "Iniquités en santé", "Action intersectorielle"], "exMtl": "", "exInsp": "", "extra": "", "images": [{"file": "images/role-sante-publique-1.webp", "caption": "Les quatre rôles de la santé publique pour améliorer l'équité en santé (CCNDS, 2013)"}], "source": "Centre de collaboration nationale des déterminants de la santé. (2013). Le rôle de la santé publique dans l'amélioration de l'équité en santé : Parlons-en. CCNDS, Université St. Francis Xavier. https://nccdh.ca/wp-content/uploads/2024/10/PHR_FR_Final.pdf"}, "participer-politiques": {"title": "Participer à l'élaboration des politiques", "definition": "« Diriger l'analyse et l'élaboration des politiques et la revendication pour des améliorations en matière de déterminants et d'iniquités en santé, et collaborer avec d'autres organismes à cet effet. »", "connexes": ["Plaidoyer", "Politiques publiques favorables à la santé", "Évaluation d'impact sur la santé (EIS)"], "exMtl": "La DRSP a déposé un mémoire sur le Plan d'urbanisme et de mobilité (PUM) de Montréal devant l'OCPM. https://ocpm.qc.ca/sites/default/files/pdf/P126/9-80_Direction%20de%20sante%CC%81%20publique%20de%20Montre%CC%81al.pdf", "exInsp": "", "extra": "", "images": [], "source": "Centre de collaboration nationale des déterminants de la santé. (2013). Le rôle de la santé publique dans l'amélioration de l'équité en santé : Parlons-en. CCNDS, Université St. Francis Xavier. https://nccdh.ca/wp-content/uploads/2024/10/PHR_FR_Final.pdf"}, "evaluation-impact-sante": {"title": "Évaluation d'impact sur la santé (EIS)", "definition": "« L'évaluation d'impact sur la santé est une démarche scientifique et collaborative visant à éclairer le processus de prise de décision. Elle a pour objectif d'anticiper et de documenter les impacts potentiels d'une politique ou d'un projet en cours d'élaboration sur l'ensemble des déterminants de la santé. De même, l'EIS permet d'apprécier la distribution de ces impacts au sein des différents groupes de la population afin d'éviter la production ou l'accroissement d'inégalités sociales de santé. »", "connexes": ["Health Impact Assessment", "Données probantes", "Aménagement et santé"], "exMtl": "Au Québec, la mesure 2.6 de la Politique gouvernementale de prévention en santé (PGPS) vise à outiller le milieu municipal afin qu'une analyse des effets potentiels sur la santé soit intégrée plus systématiquement dans la planification et l'aménagement du territoire.", "exInsp": "L'EIS réalisée avec l'Autorité régionale de transport métropolitain (ARTM), accompagnée par la Direction de santé publique de la Montérégie. https://extranet.santemonteregie.qc.ca/app/uploads/2024/01/eis-rapport-artm.pdf", "extra": "", "images": [{"file": "images/evaluation-impact-sante-2.webp", "caption": "Étapes d'une démarche d'EIS (Lapointe et Tremblay, 2022, INSPQ)"}], "source": "Institut national de santé publique du Québec. (s. d.). L'évaluation d'impact sur la santé (EIS). https://www.inspq.qc.ca/eis ; Lapointe, G. et Tremblay, É. (2022). Guide pour soutenir la réalisation d'évaluations d'impact sur la santé en milieu municipal. INSPQ. https://www.inspq.qc.ca/sites/default/files/publications/2846-guide-evaluation-impact-sante-municipal.pdf"}, "evaluer-faire-rapport": {"title": "Évaluer et faire rapport", "definition": "« Évaluer et faire rapport sur : a) la présence et l'incidence des iniquités en santé, et b) les stratégies efficaces pour les atténuer. »", "connexes": ["Surveillance", "Données désagrégées sur les ISS"], "exMtl": "Les rapports sur l'état de santé de la population montréalaise publiés par la DRSP.", "exInsp": "", "extra": "", "images": [], "source": "Centre de collaboration nationale des déterminants de la santé. (2013). Le rôle de la santé publique dans l'amélioration de l'équité en santé : Parlons-en. CCNDS, Université St. Francis Xavier. https://nccdh.ca/wp-content/uploads/2024/10/PHR_FR_Final.pdf"}, "donnees-desagregees": {"title": "Données désagrégées sur les ISS", "definition": "Les données désagrégées (ou ventilées) sont des données décomposées selon des sous-catégories — par exemple le sexe, l'âge, le revenu, la scolarité, l'origine ethnique ou le territoire. Elles permettent de révéler des inégalités que les données agrégées (les moyennes globales) masquent. La désagrégation des données est une condition préalable à l'équité en santé : la capacité à diriger les services vers ceux qui en ont le plus besoin dépend de la disponibilité de données ventilées par groupe de population.", "connexes": ["Surveillance", "Monitorage des inégalités", "Inégalités sociales de santé"], "exMtl": "Direction régionale de santé publique de Montréal. (2019). Demandeurs d'asile, réfugiés et migrants à statut précaire : un portrait montréalais. https://santepubliquemontreal.ca/sites/drsp/files/media/document/DRSP_Rapports_PortraitDemandeursAsileMtl.pdf", "exInsp": "", "extra": "« La surveillance est un processus continu et systématique d'appréciation de l'état de santé et de ses déterminants. » Elle sert notamment à éclairer la prise de décision sociosanitaire, planifier les services, informer la population, soutenir la mobilisation des acteurs et influencer les politiques publiques (DRSP, 2022).", "images": [{"file": "images/donnees-desagregees-3.webp", "caption": "Sentiment d'appartenance à la communauté locale selon le statut d'immigration (DRSP, 2019)"}], "source": "Direction régionale de santé publique du CIUSSS du Centre-Sud-de-l'Île-de-Montréal. (2022). Outil 6 – Données, informations et connaissances [document inédit]. Gouvernement du Québec ; Organisation mondiale de la Santé. (2024). Health inequality monitoring: Harnessing data to advance health equity. https://iris.who.int/handle/10665/379703"}, "modifier-orienter": {"title": "Modifier et orienter les interventions", "definition": "« Modifier et orienter les interventions et les services afin d'atténuer les iniquités, tout en tenant compte des besoins particuliers des populations marginalisées. »", "connexes": ["Universalisme proportionné", "Populations marginalisées"], "exMtl": "", "exInsp": "", "extra": "", "images": [], "source": "Centre de collaboration nationale des déterminants de la santé. (2013). Le rôle de la santé publique dans l'amélioration de l'équité en santé : Parlons-en. CCNDS, Université St. Francis Xavier. https://nccdh.ca/wp-content/uploads/2024/10/PHR_FR_Final.pdf"}, "universalisme-proportionne": {"title": "Appliquer l'universalisme proportionné", "definition": "« L'universalisme proportionné se veut une approche visant à fournir les programmes et les services de manière universelle. Cependant, les stratégies reposent sur des mesures adaptées et proportionnelles à l'étendue du désavantage, au lieu de viser seulement les groupes de population les plus désavantagés. »", "connexes": ["Gradient social de santé", "Marmot Review", "Équité en santé"], "exMtl": "De la Revitalisation urbaine intégrée (RUI, démarche ciblée, 2006) aux Quartiers inclusifs et résilients (QIR) : « Élargir l'approche des QIR à tout le territoire à partir de 2026, en intégrant l'indice d'équité des milieux de vie pour la priorisation des interventions. » (Mémoire de la DRSP sur le PUM) https://ocpm.qc.ca/sites/default/files/pdf/P126/9-80_Direction%20de%20sante%CC%81%20publique%20de%20Montre%CC%81al.pdf", "exInsp": "Au Manitoba, le programme « Les familles d'abord » (Enfants en santé Manitoba) offre un premier contact universel par une infirmière de santé publique à la naissance, puis un accompagnement à domicile d'intensité accrue — jusqu'à trois ans — pour les familles aux prises avec de plus grandes difficultés. www.gov.mb.ca/healthychild/familiesfirst/index.fr.html", "extra": "", "images": [{"file": "images/universalisme-proportionne-2.webp", "caption": "Effet des diverses stratégies d'atténuation des iniquités en santé (CCNDS, adaptation du Health Inequalities Commissioning Framework, NHS)"}, {"file": "images/universalisme-proportionne-3.webp", "caption": "Secteurs de revitalisation urbaine intégrée (RUI) à Montréal en 2006 (Ville de Montréal)"}], "source": "Centre de collaboration nationale des déterminants de la santé. (s. d.). Glossaire des principaux concepts liés à l'équité en santé. https://nccdh.ca/fr/learn/glossaire/ ; Marmot, M. (2010). Fair society, healthy lives: The Marmot review. Institute of Health Equity. https://www.instituteofhealthequity.org/resources-reports/fair-society-healthy-lives-the-marmot-review"}, "etablir-partenariats": {"title": "Établir des partenariats avec d'autres secteurs", "definition": "« Conclure des partenariats avec d'autres organismes gouvernementaux et communautaires afin de déterminer des moyens d'améliorer l'état de santé des populations marginalisées. »", "connexes": ["Intersectorialité", "Partenariat intersectoriel"], "exMtl": "Montréal, Métropole en santé regroupe des partenaires publics, institutionnels, privés et communautaires autour des saines habitudes de vie et des systèmes alimentaires.", "exInsp": "", "extra": "", "images": [], "source": "Centre de collaboration nationale des déterminants de la santé. (2013). Le rôle de la santé publique dans l'amélioration de l'équité en santé : Parlons-en. CCNDS, Université St. Francis Xavier. https://nccdh.ca/wp-content/uploads/2024/10/PHR_FR_Final.pdf"}, "engagement-communautaire": {"title": "Engagement communautaire", "definition": "« L'engagement communautaire pour l'équité en santé repose sur des relations efficaces et authentiques avec les collectivités, une pratique considérée comme essentielle en santé publique. Les membres de la communauté sont perçus comme des partenaires plutôt que comme des bénéficiaires de services, car ils sont les mieux placés pour exprimer leurs besoins en matière de santé et trouver des solutions aux inégalités sociales de santé. »", "connexes": ["Participation citoyenne", "Savoirs expérientiels", "Partage du pouvoir"], "exMtl": "La concertation arrondissements–Tables de quartier dans la planification de quartier, p. ex. le Plan de développement social de Montréal-Nord 2021-2026. https://www.tqmn.ca/site/assets/files/1352/tqnm_le-pds_vf.pdf", "exInsp": "LogementSain (Ontario) : les membres de la collectivité vivant dans des logements sources d'insécurité font partie de l'équipe de recherche et représentent le projet aux tables intersectorielles; leur vécu est reconnu comme source de connaissances légitimes (CCNDS, 2021). https://nccdh.ca/wp-content/uploads/2024/10/Lets-Talk-Community-Engagement-FR.pdf", "extra": "", "images": [{"file": "images/engagement-communautaire-1.webp", "caption": "Les cinq grandes pratiques de l'engagement communautaire axé sur l'équité en santé (CCNDS, 2021)"}], "source": "Centre de collaboration nationale des déterminants de la santé. (2022). Glossaire des principaux concepts liés à l'équité en santé. CCNDS, Université St. Francis Xavier. https://nccdh.ca/fr/learn/glossaire/"}, "conditions-vie-favorables": {"title": "Conditions de vie favorables", "definition": "« Les conditions et ressources préalables sont, en matière de santé : la paix, un abri, de la nourriture et un revenu. »", "connexes": ["Logement", "Sécurité alimentaire", "Revenu"], "exMtl": "Le Plan de développement de la communauté nourricière du Sud-Ouest de Montréal favorise l'accès à une alimentation saine, locale et abordable.", "exInsp": "", "extra": "", "images": [], "source": "Organisation mondiale de la Santé. (1986). Charte d'Ottawa pour la promotion de la santé. OMS, Santé et Bien-être social Canada, Association canadienne de santé publique."}, "pouvoir-agir": {"title": "Pouvoir d'agir collectif", "definition": "Dans la littérature, le pouvoir d'agir (empowerment) est à la fois une approche, un processus et un résultat (RQIIAC, 2020) :\n- « Une approche : fondée sur la croyance que les personnes, tant individuellement que collectivement, ont ou peuvent acquérir les capacités pour effectuer des transformations nécessaires pour assurer leur accès aux ressources, voire les contrôler (Ninacs, 2008).\n- Un processus : les personnes ou les communautés s'approprient leur pouvoir d'agir et capacité de l'exercer de façon autonome (Ninacs, 2008).\n- Un résultat : capacité concrète des personnes d'exercer individuellement ou collectivement un plus grand contrôle sur ce qui est important pour elles, leurs proches, ou la collectivité à laquelle elles s'identifient (Le Bossé, 2003). »", "connexes": ["Empowerment", "Capacité d'agir", "Autonomie"], "exMtl": "Le cadre de référence « Le pouvoir d'agir des communautés » (DRSP, 2023) opérationnalise le pouvoir d'agir collectif, notamment dans les 32 Tables de quartier.", "exInsp": "", "extra": "Le pouvoir d'agir des communautés se définit par quatre composantes : la participation (intégration dans les espaces décisionnels de la communauté); les compétences (connaissance et reconnaissance des forces du milieu, capacité de mailler les ressources locales); la communication efficace (circulation libre de l'information, transparence des processus décisionnels); et le capital communautaire (sentiment d'appartenance à la collectivité et à l'environnement).", "images": [], "source": "Regroupement québécois des intervenants et intervenantes en action communautaire en CISSS et CIUSSS. (2020). Pratique d'organisation communautaire dans les établissements de santé et de services sociaux du Québec (éd. actualisée). Presses de l'Université du Québec ; Direction régionale de santé publique de Montréal. (2023). Le pouvoir d'agir des communautés et la lutte aux inégalités sociales de santé au cœur des priorités de santé publique pour une métropole résiliente. Gouvernement du Québec. https://santepubliquemontreal.ca/sites/drsp/files/media/document/DRSP_Pub_2023_CadreRefPouvoirAgirCommLutteInegalSocialSP.pdf"}, "gouvernance-collaborative": {"title": "Gouvernance collaborative", "definition": "« Une gouvernance partagée, qui laisse aux communautés le soin d'établir elles-mêmes les priorités d'action pour agir sur l'amélioration des conditions de vie. »", "connexes": ["Gouvernance partagée", "Concertation", "Leadership collaboratif"], "exMtl": "Les 32 Tables de quartier de la Coalition montréalaise des Tables de quartier (CMTQ), soutenues par l'IMSDSL, illustrent une gouvernance collaborative ancrée dans chaque quartier.", "exInsp": "", "extra": "", "images": [], "source": "Initiative montréalaise de soutien au développement social local. (2020). Cadre de référence de l'Initiative montréalaise de soutien au développement social local."}, "impact-collectif": {"title": "Impact collectif sur les priorités locales", "definition": "L'impact collectif structure la collaboration d'acteurs de différents secteurs autour d'un problème social complexe, à partir d'un agenda commun et d'une organisation porteuse dédiée (Kania et Kramer, 2011).", "connexes": ["Agenda commun", "Organisation pivot (backbone)", "Mesure partagée"], "exMtl": "Le Projet impact collectif (PIC), phase 2 (2022-2027), piloté par Centraide du Grand Montréal, finance dans 17 quartiers montréalais des démarches collectives ciblant les priorités locales.", "exInsp": "La boîte à outils de l'impact collectif de l'Institut Tamarack. https://www.tamarackcommunity.ca/collective-impact-toolkit", "extra": "Les cinq conditions de l'impact collectif (Kania et Kramer, 2011) :\n1. Programme commun (common agenda) : une vision partagée du changement, construite collectivement.\n2. Système de mesure partagé (shared measurement) : des indicateurs et une collecte de données communs pour l'apprentissage stratégique.\n3. Activités qui se renforcent mutuellement (mutually reinforcing activities) : des actions coordonnées et complémentaires, non dupliquées.\n4. Communication continue (continuous communication) : un dialogue soutenu pour bâtir la confiance.\n5. Structure de soutien dédiée (backbone support) : une équipe « épine dorsale » qui coordonne l'ensemble.", "images": [], "source": "Kania, J. et Kramer, M. (2011). Collective impact. Stanford Social Innovation Review, 9(1), 36-41. https://ssir.org/articles/entry/collective_impact ; Tamarack Institute. (s. d.). La boîte à outils de l'impact collectif. https://www.tamarackcommunity.ca/collective-impact-toolkit"}, "le-DS": {"title": "Le DS produit les conditions requises pour le DC", "definition": "Le DS met en place les conditions structurelles — droits, financement, services, conditions de vie favorables, pouvoir d'agir, gouvernance collaborative — sans lesquelles le DC ne peut se déployer à l'échelle des milieux de vie (INSPQ, 2002; DRSP, 2023).", "connexes": ["Articulation DS-DC"], "exMtl": "", "exInsp": "", "extra": "", "images": [], "related": ["conditions", "pouvoir", "gouvernance2"], "source": "Institut national de santé publique du Québec. (2002). La santé des communautés. https://www.inspq.qc.ca/pdf/publications/082_SanteCommunautes.pdf ; cité dans DRSP (2023)."}, "le-DC": {"title": "Le DC concrétise le DS à l'échelle des milieux de vie", "definition": "« Le DC concrétise le DS à l'échelle des milieux de vie. » L'ancrage territorial traduit les orientations structurelles en projets concrets adaptés aux besoins spécifiques des quartiers, et les mobilisations locales nourrissent en retour les politiques publiques.", "connexes": ["Ancrage territorial", "Articulation DS-DC"], "exMtl": "Le PIC à Parc-Extension traduit les orientations de DS (lutte à la pauvreté, inclusion) en projets concrets coconstruits avec les résidents.", "exInsp": "", "extra": "", "images": [], "related": ["mobilisation", "mécanismes", "renforcement"], "source": "Institut national de santé publique du Québec. (2002). La santé des communautés. https://www.inspq.qc.ca/pdf/publications/082_SanteCommunautes.pdf ; cité dans DRSP (2023)."}, "mobilisation-actifs": {"title": "Mobilisation des actifs : approche ABCD", "definition": "L'approche ABCD (Asset-Based Community Development) part des forces et des capacités existantes d'une communauté plutôt que de ses manques. Le CCNDS définit l'approche fondée sur les atouts comme une démarche qui « consiste à cartographier les capacités et les actifs des individus, des associations et des institutions locales ».", "connexes": ["Approche par les forces", "Cartographie des actifs", "Community Capitals Framework"], "exMtl": "Le programme Leadership rassembleur de Centraide et Dynamo cartographie les leaders et les actifs des quartiers montréalais et bâtit sur ces forces plutôt que sur les déficits.", "exInsp": "", "extra": "L'approche ABCD identifie cinq catégories d'actifs : 1) les individus, avec leurs compétences et capacités; 2) les associations citoyennes informelles; 3) les institutions formelles; 4) les actifs liés aux lieux (terrains, bâtiments); et 5) les connexions du tissu relationnel. Partir des forces existantes accélère l'action, renforce la fierté et la résilience des communautés, et évite les approches déficitaires stigmatisantes.", "images": [], "source": "Kretzmann, J. P. et McKnight, J. L. (1993). Building communities from the inside out: A path toward finding and mobilizing a community's assets. ACTA Publications ; Centre de collaboration nationale des déterminants de la santé. (s. d.). Glossaire. https://nccdh.ca/fr/learn/glossaire/"}, "connaissances-apprentissage": {"title": "Connaissances et apprentissage", "definition": "« Fonder l'action collective sur la délibération, la planification, l'innovation et l'apprentissage collectif. » Les apprentissages collectifs et le partage de savoirs — scientifiques, expérientiels et citoyens — conditionnent la durabilité des initiatives de développement des communautés.", "connexes": ["Savoirs expérientiels", "Apprentissage collectif", "Transfert de connaissances"], "exMtl": "La communauté de pratique de la Coalition montréalaise des Tables de quartier (CMTQ), animée par Dynamo.", "exInsp": "", "extra": "", "images": [], "source": "Institut national de santé publique du Québec, cité dans Direction régionale de santé publique de Montréal. (2023). Le pouvoir d'agir des communautés et la lutte aux inégalités sociales de santé au cœur des priorités de santé publique pour une métropole résiliente. https://santepubliquemontreal.ca/sites/drsp/files/media/document/DRSP_Pub_2023_CadreRefPouvoirAgirCommLutteInegalSocialSP.pdf"}, "ressources-maillage": {"title": "Ressources et maillage", "definition": "Disponibilité et accessibilité de ressources — financières, humaines, matérielles, informationnelles — et d'espaces de participation pour soutenir l'action collective. La mobilisation des ressources et le réseautage sont des dimensions centrales du renforcement des capacités communautaires (Liberato et coll., 2011).", "connexes": ["Mobilisation des ressources", "Réseautage", "Capacités communautaires"], "exMtl": "Le service 211 Grand Montréal maille citoyens et plus de 5 000 ressources communautaires, sociales et de santé, 24 heures sur 24, 7 jours sur 7.", "exInsp": "", "extra": "", "images": [], "source": "Liberato, S. C., Brimblecombe, J., Ritchie, J., Ferguson, M. et Coveney, J. (2011). Measuring capacity building in communities: A review of the literature. BMC Public Health, 11, 850. https://doi.org/10.1186/1471-2458-11-850"}, "leadership-organisation": {"title": "Leadership et organisation", "definition": "Le développement du leadership et de la capacité collective d'agir du milieu vise à maximiser le pouvoir des communautés d'intervenir sur les enjeux qui les touchent (IMSDSL, 2020). Le renforcement des capacités communautaires (community capacity building) est le processus par lequel les communautés, les organisations et les individus développent les compétences, les ressources et les structures nécessaires pour agir collectivement sur leur santé et leurs conditions de vie.", "connexes": ["Community capacity building", "Leadership partagé", "Organisation collective"], "exMtl": "Le Forum jeunesse de l'île de Montréal accompagne depuis plus de 20 ans les conseils étudiants et les jeunes citoyens.", "exInsp": "", "extra": "Liberato et coll. (2011) synthétisent neuf dimensions interreliées du renforcement des capacités : opportunités d'apprentissage et développement des compétences; mobilisation des ressources; partenariats, liens et réseautage; leadership; prise de décision participative; approche fondée sur les actifs; sentiment d'appartenance; communication; et trajectoire de développement.", "images": [], "source": "Initiative montréalaise de soutien au développement social local. (2020). Cadre de référence ; Liberato, S. C. et coll. (2011). Measuring capacity building in communities: A review of the literature. BMC Public Health, 11, 850. https://doi.org/10.1186/1471-2458-11-850"}, "mecanismes-action-collective": {"title": "Mécanismes d'action collective", "definition": "Structures et processus — formels et informels — par lesquels les acteurs d'un milieu coordonnent leur action : une vision commune, des espaces de concertation et la participation citoyenne. Ces mécanismes transforment la juxtaposition d'acteurs en action coordonnée (INSPQ, 2002; DRSP, 2023).", "connexes": ["Impact collectif", "Concertation", "Vision commune"], "exMtl": "Le Projet impact collectif (PIC), phase 2 (2022-2027), combine financement pluriannuel, accompagnement et apprentissage partagé dans les quartiers montréalais.", "exInsp": "", "extra": "", "images": [], "source": "Institut national de santé publique du Québec. (2002). La santé des communautés. https://www.inspq.qc.ca/pdf/publications/082_SanteCommunautes.pdf ; Direction régionale de santé publique de Montréal. (2023). Le pouvoir d'agir des communautés. https://santepubliquemontreal.ca/sites/drsp/files/media/document/DRSP_Pub_2023_CadreRefPouvoirAgirCommLutteInegalSocialSP.pdf"}, "vision-commune": {"title": "Vision commune", "definition": "« L'impact collectif exige que les différences de définition du problème et de l'objectif soient discutées et résolues. » Sans définition partagée du problème, les acteurs travaillent en parallèle sans levier collectif : l'agenda commun est la première condition de l'impact collectif. (traduction libre)", "connexes": ["Agenda commun", "Diagnostic partagé"], "exMtl": "La planification de quartier 2023-2028 de Verdun, « Notre quartier inclusif et solidaire », coconstruite par les acteurs réunis autour de la Table de quartier.", "exInsp": "", "extra": "", "images": [], "source": "Kania, J. et Kramer, M. (2011). Collective impact. Stanford Social Innovation Review, 9(1), 36-41. https://ssir.org/articles/entry/collective_impact (traduction libre)"}, "concertation": {"title": "Concertation", "definition": "« La concertation est un processus volontaire, plus ou moins formel et décisionnel, de mise en commun d'analyses et de solutions à des problèmes reconnus. Elle permet le rassemblement des [parties prenantes] qui cherchent un consensus fondé sur une problématique commune, en vue d'élaborer et de mettre en œuvre, par exemple, des stratégies et des politiques économiques et sociales. »", "connexes": ["Partenariat", "Tables de quartier", "Intersectorialité"], "exMtl": "Les 32 Tables de quartier de la Coalition montréalaise des Tables de quartier réunissent organismes communautaires, institutions, élus et citoyens autour du développement social local.", "exInsp": "", "extra": "", "images": [], "source": "Institut national de santé publique du Québec. (2002). La santé des communautés : perspectives pour la contribution de la santé publique au développement social et au développement des communautés. Gouvernement du Québec. https://www.inspq.qc.ca/pdf/publications/082_SanteCommunautes.pdf"}, "participation-citoyenne": {"title": "Participation citoyenne", "definition": "« La participation citoyenne, dans le domaine de la santé publique, fait référence à l'implication des communautés dans des projets visant à améliorer la santé des populations. » Elle mobilise les savoirs expérientiels des résidents, légitime l'action publique et augmente la pertinence des interventions.", "connexes": ["Coconstruction", "Savoirs expérientiels", "Engagement communautaire"], "exMtl": "Le Budget participatif de Montréal (3e édition, 2024-2025) : une enveloppe de 45 M$, 880 idées recueillies et 28 000 votes.", "exInsp": "", "extra": "", "images": [], "source": "Lebel et Dufour (2020), cités dans Direction régionale de santé publique de Montréal. (2023). Le pouvoir d'agir des communautés et la lutte aux inégalités sociales de santé au cœur des priorités de santé publique pour une métropole résiliente. https://santepubliquemontreal.ca/sites/drsp/files/media/document/DRSP_Pub_2023_CadreRefPouvoirAgirCommLutteInegalSocialSP.pdf"}, "renforcement-tissu-social": {"title": "Renforcement du tissu social", "definition": "Le renforcement du tissu social développe la trame de relations, de confiance et de solidarité qui soutient une communauté. Il combine trois dimensions interreliées : la cohésion sociale (sentiment d'appartenance partagé), le capital social (ressources accessibles par les relations) et la résilience (capacité à absorber, s'adapter et se transformer).", "connexes": ["Cohésion sociale", "Capital social", "Résilience"], "exMtl": "Le projet « Tricoter son tissu social » de la Société écocitoyenne de Montréal réunit des résidents dans des projets d'occupation de l'espace public pour briser l'isolement.", "exInsp": "", "extra": "", "images": [], "source": "Institut national de santé publique du Québec. (2002). La santé des communautés. https://www.inspq.qc.ca/pdf/publications/082_SanteCommunautes.pdf ; cité dans DRSP (2023)."}, "cohesion-sociale": {"title": "Cohésion sociale", "definition": "« État d'une société où les disparités sociales et économiques sont réduites, et dont les membres sont solidaires, partagent des valeurs communes et éprouvent un fort sentiment d'appartenance à leur communauté. La cohésion sociale résulte d'un ensemble de processus étatiques ou citoyens qui font que les membres d'une même société s'y sentent acceptés et reconnus, peu importe leur origine, leur religion, leur allégeance politique, leur condition sociale ou physique. »", "connexes": ["Solidarité", "Sentiment d'appartenance", "Valeurs communes"], "exMtl": "Le projet « Habiter la mixité » (entente Ville de Montréal–MIDI) soutient le rapprochement interculturel dans les milieux résidentiels mixtes.", "exInsp": "", "extra": "", "images": [], "source": "Office québécois de la langue française. (2015). Cohésion sociale. Gouvernement du Québec. https://vitrinelinguistique.oqlf.gouv.qc.ca/fiche-gdt/fiche/26532506/cohesion-sociale"}, "capital-social": {"title": "Capital social", "definition": "« Le capital social est l'ensemble des ressources offertes aux individus par l'entremise de leurs relations sociales […]. Il s'agit des caractéristiques de l'organisation sociale telles que les réseaux, les normes et la confiance, qui facilitent la coordination et la coopération dans l'intérêt collectif. Le capital social se retrouve donc à la fois au niveau individuel et collectif. »", "connexes": ["Bonding", "Bridging", "Linking"], "exMtl": "L'étude « Liens sociaux et COVID-19 » (Cité-ID, 2021) documente le capital social dans six arrondissements de Montréal et son rôle dans la résilience urbaine.", "exInsp": "", "extra": "", "images": [{"file": "images/capital-social.png", "caption": "Bonding, bridging, linking : les trois formes du capital social"}], "source": "Arnaud, J., St-Amand, R.-M., Therrien, M.-C. et Normandin, J.-M. (2021). Liens sociaux et COVID-19 : Étude dans six arrondissements de Montréal. Cité-ID living lab, Gouvernance de la résilience urbaine. https://numerique.banq.qc.ca/patrimoine/details/52327/4408989"}, "resilience": {"title": "Résilience", "definition": "« La résilience repose sur trois capacités : d'absorption, d'adaptation et de transformation. » (traduction libre) Elle permet à une communauté ou à un système d'absorber les chocs, de s'y adapter et de se transformer — un objectif devenu explicite face aux crises climatiques et sanitaires.", "connexes": ["Capacité d'absorption", "Capacité d'adaptation", "Capacité de transformation"], "exMtl": "La grappe « Communautaire et santé sociale » de Montréal-Nord, accompagnée par la Maison de l'innovation sociale pendant la pandémie de COVID-19.", "exInsp": "", "extra": "", "images": [], "source": "Blanchet, K., Nam, S. L., Ramalingam, B. et Pozo-Martin, F. (2017). Governance and capacity to manage resilience of health systems: Towards a new conceptual framework. International Journal of Health Policy and Management, 6(8), 431-435. https://doi.org/10.15171/ijhpm.2017.06 (traduction libre)"}, "securite-alimentaire": {"title": "Sécurité alimentaire", "definition": "Priorité locale fréquemment retenue par les communautés montréalaises : l'accès à une alimentation saine, nutritive, abordable et adaptée.", "connexes": ["Insécurité alimentaire", "Système alimentaire"], "exMtl": "Le groupe de travail sur la citoyenneté alimentaire de Montréal, Métropole en santé (Conseil du Système alimentaire montréalais).", "exInsp": "", "extra": "", "images": [], "source": "Coalition montréalaise des Tables de quartier ; Initiative montréalaise de soutien au développement social local. (2020). Cadre de référence."}, "logement": {"title": "Logement", "definition": "Priorité locale fréquemment retenue par les communautés montréalaises : l'accès et le maintien à un logement adéquat, abordable et salubre.", "connexes": ["Logement abordable", "Salubrité", "Itinérance"], "exMtl": "Le modèle conceptuel logement développé par la DRSP de Montréal (santepubliquemontreal.ca, section professionnels et partenaires, thématiques de santé publique, logement).", "exInsp": "", "extra": "", "images": [], "source": "Coalition montréalaise des Tables de quartier ; Initiative montréalaise de soutien au développement social local. (2020). Cadre de référence."}, "insertion-socioprofessionnelle": {"title": "Insertion socioprofessionnelle", "definition": "Priorité locale fréquemment retenue par les communautés montréalaises : l'insertion socioprofessionnelle des personnes éloignées du marché du travail.", "connexes": ["Employabilité", "Inclusion économique"], "exMtl": "", "exInsp": "", "extra": "", "images": [], "source": "Coalition montréalaise des Tables de quartier ; Initiative montréalaise de soutien au développement social local. (2020). Cadre de référence."}, "developpement-enfant": {"title": "Développement de l'enfant", "definition": "Priorité locale fréquemment retenue par les communautés montréalaises : le développement de l'enfant et le soutien à la parentalité.", "connexes": ["Petite enfance", "Soutien à la parentalité", "Maturité scolaire"], "exMtl": "Les Services intégrés en périnatalité et pour la petite enfance (SIPPE) dans les CIUSSS montréalais offrent un suivi universel d'intensité accrue aux familles en situation de vulnérabilité.", "exInsp": "", "extra": "", "images": [], "source": "Coalition montréalaise des Tables de quartier ; Initiative montréalaise de soutien au développement social local. (2020). Cadre de référence."}, "equite-sante": {"title": "Équité en santé", "definition": "L'équité en santé signifie que toutes les personnes peuvent atteindre leur plein potentiel de santé sans être désavantagées par leur position sociale ou par d'autres circonstances déterminées socialement (CCNDS). Elle se distingue de l'égalité : il s'agit de répondre aux besoins selon leur ampleur, et non d'offrir la même chose à tous.", "connexes": ["Inégalités sociales de santé", "Justice sociale", "Gradient social"], "exMtl": "", "exInsp": "", "extra": "", "images": [], "source": "Centre de collaboration nationale des déterminants de la santé. (s. d.). Glossaire des principaux concepts liés à l'équité en santé. https://nccdh.ca/fr/learn/glossaire/"}, "cadre-conceptuel": {"title": "Cadre conceptuel", "definition": "Le cadre de référence répond au besoin de la DRSP de définir une vision commune du DC et du DS pour son organisation, et de faire connaître sa vision à ses partenaires.", "connexes": ["Vision commune", "Outil de planification"], "exMtl": "Le modèle conceptuel logement développé par la DRSP de Montréal.", "exInsp": "", "extra": "", "images": [], "source": "Direction régionale de santé publique de Montréal. (2023). Le pouvoir d'agir des communautés et la lutte aux inégalités sociales de santé au cœur des priorités de santé publique pour une métropole résiliente. Gouvernement du Québec. https://santepubliquemontreal.ca/sites/drsp/files/media/document/DRSP_Pub_2023_CadreRefPouvoirAgirCommLutteInegalSocialSP.pdf"}};

ZONES.forEach(([id, top, left, height, width]) => {

function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;'); }
function linkify(s) {
  return esc(s).replace(/(https?:\/\/[^\s)\]]+|www\.[^\s)\]]+)/g, u => {
    const href = u.startsWith('http') ? u : 'https://' + u;
    return `<a href="${href}" target="_blank" rel="noopener">${u}</a>`;
  });
}

function termCard(slug) {
  const c = DATA[slug];
  const parts = [];
  if (c.definition) parts.push(`<div class="section-label">Définition</div><div class="definition">${linkify(c.definition)}</div>`);
  (c.images || []).forEach(im => {
    parts.push(`<div class="concept-image"><img src="${im.file}" alt="${esc(c.title)}" onerror="this.parentElement.style.display='none'">${im.caption ? `<div class="caption">${esc(im.caption)}</div>` : ''}</div>`);
  });
  if (c.connexes && c.connexes.length) parts.push(`<div class="section-label">Termes connexes</div><div class="connexes">${c.connexes.map(t => `<span class="chip">${esc(t)}</span>`).join('')}</div>`);
  if (c.exMtl) parts.push(`<div class="example"><div class="label">Exemple à Montréal</div><div>${linkify(c.exMtl)}</div></div>`);
  if (c.exInsp) parts.push(`<div class="example inspirant"><div class="label">Exemple inspirant</div><div>${linkify(c.exInsp)}</div></div>`);
  if (c.extra) parts.push(`<div class="extra-block"><div class="label">Pour aller plus loin</div>${linkify(c.extra)}</div>`);
  if (c.related && c.related.length) {
    const rel = c.related.filter(z => ZONEMAP[z]).map(z => `<button onclick="selectZone('${z}')">${esc(DATA[ZONEMAP[z].slug].title)}</button>`).join('');
    if (rel) parts.push(`<div class="section-label">Explorer</div><div class="related-links">${rel}</div>`);
  }
  if (c.source) parts.push(`<div class="source">Source. ${linkify(c.source)}</div>`);
  if (!parts.length) parts.push(`<div class="empty-note">Fiche à compléter — aucun contenu pour l'instant.</div>`);
  return `<div class="concept-card">${parts.join('')}</div>`;
}

function selectZone(id, fromSearch) {
  const m = ZONEMAP[id];
  if (!m) return;
  document.querySelectorAll('.zone').forEach(z => z.classList.toggle('active', z.dataset.zone === id));
  const c = DATA[m.slug];
  contentEl.innerHTML = `<div class="section-banner"><div class="kicker">${esc(m.group)}</div><h1>${esc(c.title)}</h1></div>${termCard(m.slug)}`;
  document.querySelector('.right').scrollTop = 0;
  searchResults.classList.remove('open');
  if (!fromSearch) searchInput.value = '';
}
window.selectZone = selectZone;

function goHome() {
  document.querySelectorAll('.zone').forEach(z => z.classList.remove('active'));
  const n = Object.keys(ZONEMAP).length;
  contentEl.innerHTML = `<div class="welcome">
    <h1>Cadre conceptuel DS-DC</h1>
    <p>Cliquez sur une section du cadre à gauche pour explorer les définitions, les termes connexes, les exemples montréalais et les exemples inspirants.</p>
    <p>Utilisez la barre de recherche pour accéder directement à un concept par son nom.</p>
    <span class="hint">${n} concepts cliquables</span></div>`;
  document.querySelector('.right').scrollTop = 0;
}
homeBtn.addEventListener('click', goHome);
goHome();

searchInput.addEventListener('input', e => {
  const q = e.target.value.trim().toLowerCase();
  if (!q) { searchResults.classList.remove('open'); return; }
  const matches = [];
  Object.entries(ZONEMAP).forEach(([z, m]) => {
    const c = DATA[m.slug];
    if (c.title.toLowerCase().includes(q) || (c.connexes || []).some(t => t.toLowerCase().includes(q)) || m.group.toLowerCase().includes(q)) matches.push([z, c.title, m.group]);
  });
  if (!matches.length) { searchResults.innerHTML = '<div class="item">Aucun résultat</div>'; }
  else {
    searchResults.innerHTML = matches.slice(0, 20).map(([z, t, g]) => `<div class="item" data-zone="${z}">${esc(t)} <span style="color:#000000;font-size:11px;margin-left:6px">${esc(g)}</span></div>`).join('');
  }
  searchResults.classList.add('open');
});
searchResults.addEventListener('click', e => {
  const item = e.target.closest('.item');
  if (item && item.dataset.zone) selectZone(item.dataset.zone, true);
});
document.addEventListener('click', e => {
  if (!e.target.closest('.search-bar')) searchResults.classList.remove('open');
});

function simpleSVG(tab) {
  const W = 1040, X = 70, RW = 900, CH = 46, INK = '#000000';
  let y = 118, out = [];
  DSL_ROWS.forEach(row => {
    if (row.lab) { out.push(`<text x="${W/2}" y="${y+24}" text-anchor="middle" font-size="16.5" fill="#000000">${row.lab}</text>`); y += 40; }
    else { y += 6; }
    const n = row.chips.length, gap = 6, cw = (RW - gap*(n-1))/n;
    row.chips.forEach((ch, i) => {
      const x = X + i*(cw+gap), fill = ch[2] || row.c;
      out.push(`<g class="snode" data-node="${ch[0]}"><rect class="box" x="${x.toFixed(1)}" y="${y}" width="${cw.toFixed(1)}" height="${CH}" rx="${CH/2}" fill="${fill}"/>` +
        `<text x="${(x+cw/2).toFixed(1)}" y="${y+CH/2+5.5}" text-anchor="middle" font-size="${row.fs}" font-weight="700" letter-spacing=".04em" fill="${INK}">${ch[1]}</text></g>`);
    });
    y += CH;
  });
  y += 30;
  return `<svg viewBox="0 0 ${W} ${y}" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block;font-family:inherit" role="group" aria-label="Cadre conceptuel du développement social local">` +
    `<text x="${W/2}" y="58" text-anchor="middle" font-size="27" font-weight="800" fill="${INK}">CADRE CONCEPTUEL DU DÉVELOPPEMENT SOCIAL LOCAL (DSL)</text>` +
    out.join('') + `</svg>`;
}

/* ---- Rendu des onglets exemples ---- */
let activeTab = 'cadre';
let activeNode = { verdun: null, cdn: null };

function renderExHome(tab) {
  const ex = EX[tab];
  const chrono = ex.chrono.map(([d, e]) => `<div><b>${d}</b> — ${esc(e)}</div>`).join('');
  const srcs = ex.srcs.map(([l, u]) => `<a href="${u}" target="_blank" rel="noopener">${esc(l)}</a>`).join(' · ');
  contentEl.innerHTML = `<div class="section-banner"><div class="kicker">${esc(ex.kicker)}</div><h1>${esc(ex.title)}</h1></div>
    <div class="concept-card"><div class="definition">${esc(ex.intro)}</div>
    <div class="section-label">Chronologie</div><div class="chrono">${chrono}</div>
    <div class="extra-block"><div class="label">Comment lire cet onglet</div>Cliquez sur un concept du cadre simplifié à gauche pour voir comment ce projet l'illustre concrètement — avec les lois, budgets, instances et acteurs en jeu.</div>
    <div class="source">Sources principales. ${srcs}</div></div>`;
  document.querySelector('.right').scrollTop = 0;
}

function renderExNode(tab, node) {
  const ex = EX[tab]; const d = ex.nodes[node];
  if (!d) return;
  activeNode[tab] = node;
  const lv = document.getElementById('lv-' + tab);
  lv.querySelectorAll('.snode').forEach(g => g.classList.toggle('active', g.dataset.node === node));
  const items = d.items.map(i => `<div class="ex-item">${i}</div>`).join('');
  const src = (d.src && d.src.length) ? `<div class="source">Sources. ${d.src.map(([l, u]) => `<a href="${u}" target="_blank" rel="noopener">${esc(l)}</a>`).join(' · ')}</div>` : '';
  const zone = NODE_TO_ZONE[node];
  const theory = zone && ZONEMAP[zone] ? `<div class="theory-link"><button onclick="openTheory('${zone}')">Voir la fiche théorique : ${esc(DATA[ZONEMAP[zone].slug].title)}</button></div>` : '';
  const title = NODE_TITLES[node];
  contentEl.innerHTML = `<div class="section-banner"><div class="kicker">${esc(ex.kicker)}</div><h1>${esc(title)}</h1></div>
    <div class="concept-card"><div class="definition">${esc(d.how)}</div>${items}${theory}${src}</div>`;
  document.querySelector('.right').scrollTop = 0;
}

function openTheory(zone) { setTab('cadre'); selectZone(zone); }
window.openTheory = openTheory;

const ALL_TABS = ['cadre', 'verdun', 'cdn'];
function setTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(b => b.setAttribute('aria-current', b.dataset.tab === tab ? 'page' : 'false'));
  ALL_TABS.forEach(t => { document.getElementById('lv-' + t).hidden = (t !== tab); });
  if (tab === 'cadre') { goHome(); }
  else if (tab === 'verdun' || tab === 'cdn') { activeNode[tab] ? renderExNode(tab, activeNode[tab]) : renderExHome(tab); }
}

['verdun', 'cdn'].forEach(tab => {
  const lv = document.getElementById('lv-' + tab);
  lv.innerHTML = simpleSVG(tab);
  lv.addEventListener('click', e => {
    const g = e.target.closest('.snode');
    if (g) renderExNode(tab, g.dataset.node);
  });
});


document.querySelectorAll('.tab').forEach(b => b.addEventListener('click', () => setTab(b.dataset.tab)));

homeBtn.addEventListener('click', () => {
  if (activeTab === 'verdun' || activeTab === 'cdn') { activeNode[activeTab] = null; document.getElementById('lv-' + activeTab).querySelectorAll('.snode').forEach(g => g.classList.remove('active')); renderExHome(activeTab); }
});

/* Recherche : depuis un onglet exemple, ramène vers le concept (dans l'exemple si possible, sinon dans le cadre complet) */
const ZONE_TO_NODE = {};
Object.entries(NODE_TO_ZONE).forEach(([n, z]) => { ZONE_TO_NODE[z] = n; });
ZONE_TO_NODE['sécurité'] = 'impact'; ZONE_TO_NODE['logement'] = 'impact';
searchResults.addEventListener('click', e => {
  const item = e.target.closest('.item');
  if (!item || !item.dataset.zone) return;
  const z = item.dataset.zone;
  if (activeTab !== 'cadre') {
    const n = ZONE_TO_NODE[z];
    if (n && !(z === 'sécurité' && activeTab === 'cdn') && !(z === 'logement' && activeTab === 'verdun')) {
      e.stopImmediatePropagation(); renderExNode(activeTab, n);
      searchResults.classList.remove('open'); searchInput.value = '';
      return;
    }
    e.stopImmediatePropagation(); setTab('cadre'); selectZone(z, true);
    searchResults.classList.remove('open'); searchInput.value = '';
  }
}, true);
</script>
