<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Redirection…</title>
<script>
/* Routage par onglet sur GitHub Pages.
   Pages renvoie ce fichier pour toute URL profonde (ex. /concertations).
   On encode le chemin dans la requête puis on revient à index.html, qui le décode.
   pathSegmentsToKeep = 0 : domaine personnalisé (dsdcmontreal.ca), site servi à la racine. */
(function () {
  var pathSegmentsToKeep = 0;
  var l = window.location;
  l.replace(
    l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
    l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
    l.pathname.split('/').slice(1 + pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
    (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
    l.hash
  );
})();
</script>
</head>
<body></body>
</html>
