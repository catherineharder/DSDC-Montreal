name: Synchronisation du site depuis Google Sheets

# Régénère acronymes.html, concertations.data.js et tables-quartier.members.js
# à partir des trois feuilles Google configurées dans sync/config.json.
#
# S'exécute :
#   - chaque jour à 03h00 UTC (≈ 23h00 au Québec en EDT, 22h00 en EST)
#   - manuellement via l'onglet « Actions » de GitHub (workflow_dispatch)
#
# Aucun secret requis pour les feuilles : elles sont lues via l'export CSV
# public de Google (gviz). Chaque feuille doit être partagée « Tout le monde
# disposant du lien : Lecteur ». Voir SETUP.md.
#
# Visuels Notion (facultatif) : si le secret NOTION_TOKEN est défini
# (Settings → Secrets and variables → Actions), les images de la page Notion
# « Assets » sont aussi téléchargées dans images/assets/. Voir GUIDE-ASSETS.md.

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-site
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Régénérer les fichiers du site depuis les feuilles
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python3 sync/sync_all.py

      - name: Pousser les changements
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add acronymes.html assets/data/concertations.data.js assets/data/tables-quartier.members.js
          git add -A images/assets assets/data/assets-manifest.js
          if git diff --cached --quiet; then
            echo "Aucun changement à pousser."
          else
            git commit -m "Synchronisation automatique du site ($(date -u +%Y-%m-%d))"
            git push
          fi

